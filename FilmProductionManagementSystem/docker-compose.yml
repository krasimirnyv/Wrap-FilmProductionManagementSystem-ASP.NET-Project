# ═══════════════════════════════════════════════════════════════
#  Wrap – FilmProductionManagementSystem
#  docker-compose.yml
#
#  Start:
#    1. Copy .env.example -> .env
#    2. Put your SA password in .env
#    3. docker compose up -d --build
#
#  Stop:
#    docker compose down
#
#  Stop + delete data (fresh DB):
#    docker compose down -v
# ═══════════════════════════════════════════════════════════════

services:
  wrap_db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: wrap_db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "${MSSQL_PORT:-1434}:1433"
    volumes:
      - wrap_db_data:/var/opt/mssql
      - /Users/krasi/docker-project/backup:/var/opt/mssql/backup
      - /Users/krasi/docker-project/media:/var/opt/mssql/media
    networks:
      - wrapnet

  wrap_app:
    image: wrap.filmproductionmanagementsystem.web
    container_name: wrap_app
    build:
      context: .
      dockerfile: Wrap.FilmProductionManagementSystem.Web/Dockerfile
    restart: unless-stopped
    depends_on:
      - wrap_db
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DockerConnection: "Server=wrap_db,1433;Database=WrapDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};Encrypt=true;TrustServerCertificate=true;"
    ports:
      - "8080:8080"
    networks:
      - wrapnet

volumes:
  wrap_db_data:

networks:
  wrapnet:
    driver: bridge