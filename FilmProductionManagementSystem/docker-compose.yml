# ═══════════════════════════════════════════════════════════════
#  Wrap – FilmProductionManagementSystem
#  docker-compose.yml
#
#  Start SQL Server in Docker:
#    1. Copy .env.example → .env and write the password
#    2. docker compose up -d
#
#  Stop it:
#    1. docker compose down
#
#  Stop + delete data (fresh DB):
#    1. docker compose down -v
# ═══════════════════════════════════════════════════════════════

# Optional:
# version: "3.9"

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wrap-sqlserver
    restart: unless-stopped

    # Starts only if user selecets:
    # docker compose --profile db up -d

    profiles: ["db"]

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"                     # Free Developer edition
      MSSQL_SA_PASSWORD: "${MSSQ_SA_PASSWORD}"   # It comes from .env file

      # Optional:
      # MSSQL_COLLATION: "SQL_Latin1_General_CP1_CI_AS"

    ports:
      - "${MSSQL_PORT:-1433}:1433"               # Local app connects localhost,1434

    volumes:
      - sqlserver_data:/var/opt/mssql

    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q\"SELECT 1\" -C > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  sqlserver_data:
    name: wrap_sqlserver_data